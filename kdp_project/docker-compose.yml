version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=kdp_author_manager
      - DB_USERNAME=kdp_user
      - DB_PASSWORD=kdp_password
    depends_on:
      - db
    command: sh -c "chmod -R 775 storage bootstrap/cache && php artisan migrate --force && apache2-ctl -D FOREGROUND"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: kdp_author_manager
      MYSQL_USER: kdp_user
      MYSQL_PASSWORD: kdp_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    depends_on:
      - db

volumes:
  db_data: